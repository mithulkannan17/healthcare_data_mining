{% extends 'base.html' %}

{% block content %}

<h1 class="page-title">
    {% if success %}

    <div class="alert alert-success mt-3">

        {{ success }}

    </div>

    {% endif %}
    Add New Patient Record
</h1>

<div class="row">

    <div class="col-md-8">

        <div class="card form-card">

            <form method="POST" action="/save-patient">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Patient ID</label>

                        <input type="text" name="patient_id" class="form-control" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Age</label>

                        <input type="number" name="age" class="form-control" required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Gender</label>

                        <select name="gender" class="form-select">
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>State</label>

                        <input type="text" name="state" class="form-control" required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Region</label>

                        <select name="region" class="form-select">
                            <option>North</option>
                            <option>South</option>
                            <option>East</option>
                            <option>West</option>
                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Disease Category</label>

                        <select name="disease_category" class="form-select">
                            <option>Waterborne</option>
                            <option>Vector-Borne</option>
                            <option>Respiratory</option>
                            <option>Chronic</option>
                            <option>Infectious</option>
                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Severity</label>

                        <select name="severity" class="form-select">
                            <option>Mild</option>
                            <option>Moderate</option>
                            <option>Severe</option>
                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>BMI</label>

                        <input type="number" step="0.1" name="bmi" class="form-control" required>

                    </div>

                </div>

                <div class="mb-3">

                    <label>Symptoms</label>

                    <textarea name="symptoms" rows="3" class="form-control"></textarea>

                </div>

                <div class="mb-3">

                    <label>Smoking Status</label>

                    <select name="smoking_status" class="form-select">
                        <option>Never</option>
                        <option>Former</option>
                        <option>Current</option>
                    </select>

                </div>

                <button class="btn risk-btn">
                    Save Patient Record
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
